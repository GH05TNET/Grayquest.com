<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrayQuest EMI Form to Sheets</title>
    
    <link rel="icon" type="image/jpg" href="https://i.ibb.co/C5n4xzn7/Uploaded-8063565025.jpg">
    
    <style>
        :root { --primary: #0052cc; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg); padding: 20px; }
        .form-container { max-width: 900px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-top: 5px solid var(--primary); }
        .header { text-align: center; margin-bottom: 30px; }
        
        /* Logo styling for a professional look */
        .header img { 
            width: 120px; 
            height: 120px; 
            object-fit: contain; 
            border-radius: 50%; /* Circle shape if it's a square logo */
            margin-bottom: 10px;
            border: 2px solid var(--primary);
        }
        
        .header h2 { color: var(--primary); margin: 5px 0; }
        .section-title { background: #e7f0ff; color: var(--primary); padding: 10px 15px; font-weight: bold; margin: 25px 0 15px 0; border-radius: 4px; border-left: 5px solid var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #444; }
        input, select { padding: 10px; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px; }
        .btn-submit { width: 100%; background: var(--primary); color: #fff; padding: 15px; border: none; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; transition: 0.3s; }
        .btn-submit:hover { background: #003d99; }
        .btn-submit:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header">
        <img src="https://i.ibb.co/C5n4xzn7/Uploaded-8063565025.jpg" alt="GrayQuest Logo">
        <h2>EMI Application Form</h2>
    </div>

    <form id="sheet-form">
        <div class="section-title">1. Institute Details</div>
        <div class="grid">
            <div class="form-group"><label>Institute Name</label><input type="text" name="institute_name" required></div>
            <div class="form-group"><label>Branch/Location</label><input type="text" name="location" required></div>
            <div class="form-group"><label>Total Fee Due</label><input type="number" name="total_fee" required></div>
            <div class="form-group"><label>Current Fee Due</label><input type="number" name="current_fee" required></div>
        </div>
        <div class="form-group"><label>Additional Fee</label><input type="text" name="additional_fee"></div>

        <div class="section-title">2. Student Details</div>
        <div class="grid">
            <div class="form-group"><label>Student Name</label><input type="text" name="student_name" required></div>
            <div class="form-group"><label>Class/Course (Year)</label><input type="text" name="student_class" required></div>
            <div class="form-group">
                <label>Student Type</label>
                <select name="student_type"><option value="New">New</option><option value="Existing">Existing</option></select>
            </div>
        </div>

        <div class="section-title">3. Parent/Applicant Details</div>
        <div class="grid">
            <div class="form-group"><label>Full Name</label><input type="text" name="parent_name" required></div>
            <div class="form-group"><label>WhatsApp No</label><input type="tel" name="whatsapp_no" required></div>
            <div class="form-group"><label>Secondary Contact No</label><input type="tel" name="secondary_no"></div>
            <div class="form-group"><label>Date of Birth</label><input type="date" name="dob" required></div>
            <div class="form-group"><label>Gender</label><select name="gender" required><option value="Male">Male</option><option value="Female">Female</option></select></div>
            <div class="form-group"><label>Marital Status</label><select name="marital_status" required><option value="Single">Single</option><option value="Married">Married</option></select></div>
            <div class="form-group"><label>Email Address</label><input type="email" name="parent_email" required></div>
            <div class="form-group"><label>Residence Type</label><select name="residence_type" required><option value="Owned">Owned</option><option value="Rented">Rented</option></select></div>
            <div class="form-group"><label>Pincode/City</label><input type="text" name="pincode_city" required></div>
            <div class="form-group"><label>PAN No</label><input type="text" name="pan_no" required></div>
            <div class="form-group"><label>Aadhar Number</label><input type="number" name="aadhar_no" required></div>
            <div class="form-group"><label>Employment Type</label><select name="employment_type" required><option value="Salaried">Salaried</option><option value="Self Employed">Self Employed</option></select></div>
            <div class="form-group"><label>Work Experience</label><input type="text" name="experience"></div>
            <div class="form-group"><label>Annual Income</label><input type="number" name="annual_income" required></div>
        </div>
        <div class="form-group"><label>Residential Address</label><input type="text" name="address" required></div>

        <button type="submit" class="btn-submit" id="submitBtn">Submit Form</button>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyZVj0DGVQsTQp7hJchBvDaJzzavyIfJWqz8LBOFpHyJETMYDCyUI7JqplO4Zx7Vcak/exec'; // Yahan apna Script URL paste karein
    const form = document.getElementById('sheet-form');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = 'Saving Data...';

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert("Success! Form details have been sent via email.");
                btn.disabled = false;
                btn.innerText = 'Submit Application';
                form.reset();
            })
            .catch(error => {
                alert("Failed to send! Please check EmailJS settings.");
                btn.disabled = false;
                btn.innerText = 'Submit Application';
            });
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrayQuest EMI Application Form</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root {
            --primary: #0052cc;
            --secondary: #6c757d;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
        }

        .form-container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border-top: 5px solid var(--primary);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header img { width: 220px; margin-bottom: 10px; }
        .header h2 { color: var(--primary); margin: 0; font-size: 24px; text-transform: uppercase; }

        .section-title {
            background: #e7f0ff;
            color: var(--primary);
            padding: 10px 15px;
            font-weight: bold;
            margin: 25px 0 15px 0;
            border-radius: 4px;
            font-size: 18px;
            border-left: 5px solid var(--primary);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #444;
        }

        input, select {
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0,82,204,0.1);
        }

        .radio-group {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-top: 5px;
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: #fff;
            padding: 15px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            transition: 0.3s;
        }

        .btn-submit:hover { background: #003d99; }

        .footer-info {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header">
        <img src="https://i.ibb.co/C5n4xzn7/Uploaded-8063565025.jpg" alt="GrayQuest Logo">
        <h2>EMI Application Form </h2>
    </div>

    <form id="emi-application-form">
        <div class="section-title">1. Institute Details </div>
        <div class="grid">
            <div class="form-group">
                <label>Institute Name</label>
                <input type="text" name="institute_name" required>
            </div>
            <div class="form-group">
                <label>Branch/Location</label>
                <input type="text" name="location" required>
            </div>
            <div class="form-group">
                <label>Total Fee Due</label>
                <input type="number" name="total_fee" required>
            </div>
            <div class="form-group">
                <label>Current Fee Due</label>
                <input type="number" name="current_fee" required>
            </div>
        </div>
        <div class="form-group" style="margin-top: 15px;">
            <label>Any Additional Fee (Transport/Hostel/Books/Uniform)</label>
            <input type="text" name="additional_fee">
        </div>

        <div class="section-title">2. Student Details </div>
        <div class="grid">
            <div class="form-group">
                <label>Student Name</label>
                <input type="text" name="student_name" required>
            </div>
            <div class="form-group">
                <label>Class/Grade/Course (Year)</label>
                <input type="text" name="student_class" required>
            </div>
            <div class="form-group">
                <label>Student Type</label>
                <div class="radio-group">
                    <label style="font-weight: normal;"><input type="radio" name="student_type" value="New" checked> New</label>
                    <label style="font-weight: normal;"><input type="radio" name="student_type" value="Existing"> Existing</label>
                </div>
            </div>
        </div>

        <div class="section-title">3. Parent/Applicant Details </div>
        <div class="grid">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="parent_name" required>
            </div>
            <div class="form-group">
                <label>Primary Contact No (WhatsApp)</label>
                <input type="tel" name="whatsapp_no" required>
            </div>
            <div class="form-group">
                <label>Secondary Contact No</label>
                <input type="tel" name="secondary_no">
            </div>
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" name="dob" required>
            </div>
            <div class="form-group">
                <label>Gender</label>
                <select name="gender" required>
                    <option value="">Select</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Marital Status</label>
                <select name="marital_status" required>
                    <option value="">Select</option>
                    <option value="Single">Single</option>
                    <option value="Married">Married</option>
                </select>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="parent_email" required>
            </div>
            <div class="form-group">
                <label>Residence Type</label>
                <select name="residence_type" required>
                    <option value="">Select</option>
                    <option value="Owned">Owned</option>
                    <option value="Rented">Rented</option>
                    <option value="Company Provided">Company Provided</option>
                </select>
            </div>
            <div class="form-group">
                <label>Pincode/City</label>
                <input type="text" name="pincode_city" required>
            </div>
            <div class="form-group">
                <label>PAN (Permanent Account Number)</label>
                <input type="text" name="pan_no" required pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}">
            </div>
            <div class="form-group">
                <label>Aadhar Number/Virtual ID</label>
                <input type="number" name="aadhar_no" required>
            </div>
            <div class="form-group">
                <label>Employment Type</label>
                <select name="employment_type" required>
                    <option value="">Select</option>
                    <option value="Salaried">Salaried</option>
                    <option value="Self Employed">Self Employed</option>
                </select>
            </div>
            <div class="form-group">
                <label>Total Work Experience (Years)</label>
                <input type="text" name="experience">
            </div>
            <div class="form-group">
                <label>Annual Income (In Rupee)</label>
                <input type="number" name="annual_income" required>
            </div>
        </div>
        <div class="form-group" style="margin-top: 15px;">
            <label>Primary Residential Address</label>
            <input type="text" name="address" required>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Submit Application</button>
    </form>

    <div class="footer-info">
        www.grayquest.com | Support: 9324507084, 8999230669 
    </div>
</div>

<script>
    // EmailJS Initialisation
    (function() {
        emailjs.init("YOUR_PUBLIC_KEY"); // Yahan EmailJS Dashboard se Public Key dalein
    })();

    const form = document.getElementById('emi-application-form');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        btn.innerText = 'Sending...';
        btn.disabled = true;

        // Form details ko EmailJS par bhejna
        emailjs.sendForm('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', this)
            .then(() => {
                alert('Success! Form details have been sent via email.');
                btn.innerText = 'Submit Application';
                btn.disabled = false;
                form.reset();
            }, (err) => {
                alert('Failed to send! Please check EmailJS settings.');
                console.log(err);
                btn.innerText = 'Submit Application';
                btn.disabled = false;
            });
    });
</script>

</body>
</html>
